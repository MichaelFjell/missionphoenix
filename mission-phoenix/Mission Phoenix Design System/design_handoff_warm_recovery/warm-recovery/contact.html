<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Contact — Mission Phoenix</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site.css">
<style>
  .title{font-size:clamp(26px,4vw,34px);font-weight:800;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;}
  .sep{width:60px;height:2px;background:var(--copper);margin-bottom:40px;border-radius:2px;}
  .lead{font-size:17px;line-height:1.85;color:var(--ink-2);margin-bottom:36px;}
  .cards{display:flex;flex-direction:column;gap:14px;}
  .mail-card{display:block;padding:26px 28px;background:var(--card);border:1px solid var(--line);border-radius:14px;transition:border-color .2s;}
  .mail-card:hover{border-color:var(--copper);}
  .mc-lab{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px;}
  .mc-addr{font-size:17px;font-weight:700;letter-spacing:1px;color:var(--copper);}
</style>
</head>
<body data-active="contact">
<main class="page narrow">
  <h1 class="title">Contact</h1>
  <div class="sep"></div>
  <p class="lead">For personal or business inquiries, reach out through either email below.</p>

  <div class="cards">
    <a href="mailto:fjellmicha@proton.me" class="mail-card">
      <div class="mc-lab">ProtonMail</div>
      <div class="mc-addr">fjellmicha@proton.me</div>
    </a>
    <a href="mailto:fjellmichaa@gmail.com" class="mail-card">
      <div class="mc-lab">Gmail</div>
      <div class="mc-addr">fjellmichaa@gmail.com</div>
    </a>
  </div>
</main>
<script src="chrome.js"></script>
</body></html>
