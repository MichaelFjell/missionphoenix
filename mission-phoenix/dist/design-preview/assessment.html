<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Self-Assessment — Mission Phoenix</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site.css">
<style>
  main.page.narrow{max-width:720px;}

  /* Intro */
  .intro{text-align:center;padding:40px 0 20px;}
  .intro .mark{width:64px;height:64px;margin:0 auto 24px;}
  .intro h1{font-size:clamp(32px,5vw,44px);font-weight:800;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;}
  .intro .sep{width:60px;height:2px;background:var(--copper);margin:0 auto 24px;border-radius:2px;}
  .intro .sub{font-size:19px;line-height:1.7;color:var(--ink-2);font-style:italic;max-width:520px;margin:0 auto 16px;}
  .intro .desc{font-size:15px;line-height:1.8;color:var(--ink-3);margin-bottom:40px;}
  .intro .begin{font-size:14px;font-weight:700;letter-spacing:3px;padding:16px 40px;background:transparent;color:var(--copper);border:1px solid var(--copper);cursor:pointer;font-family:inherit;text-transform:uppercase;transition:all .2s;}
  .intro .begin:hover{background:var(--copper);color:var(--card);}
  .intro .disclaim{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--ink-3);text-transform:uppercase;margin-top:28px;}

  /* Quiz */
  .quiz{padding:20px 0;}
  .progress{height:2px;background:var(--line);margin-bottom:12px;overflow:hidden;border-radius:2px;}
  .progress > div{height:100%;background:var(--copper);transition:width .5s ease;}
  .q-count{font-size:12px;font-weight:700;letter-spacing:3px;color:var(--ink-3);margin-bottom:40px;}
  .q-text{font-size:clamp(22px,4vw,28px);font-weight:700;line-height:1.35;color:var(--ink);margin-bottom:8px;letter-spacing:-0.01em;}
  .q-subtitle{font-size:15px;color:var(--ink-3);font-style:italic;margin-bottom:28px;line-height:1.6;}
  .opts{display:flex;flex-direction:column;gap:10px;}
  .opt{font-size:16px;padding:18px 22px;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:12px;cursor:pointer;text-align:left;transition:all .15s;font-family:inherit;}
  .opt:hover{border-color:var(--copper);background:var(--copper-soft);}
  .opt.selected{border-color:var(--copper);background:var(--copper-soft);color:var(--copper);font-weight:600;}
  .continue{margin-top:24px;font-size:13px;font-weight:700;letter-spacing:3px;padding:14px 32px;background:transparent;color:var(--copper);border:1px solid var(--copper);cursor:pointer;font-family:inherit;text-transform:uppercase;}
  .continue:disabled{opacity:0.3;cursor:default;}

  .fact{margin-top:48px;padding-top:28px;border-top:1px solid var(--line);}
  .fact-lab{font-size:10px;font-weight:700;letter-spacing:3px;color:var(--copper);margin-bottom:10px;}
  .fact-text{font-size:14px;line-height:1.75;color:var(--ink-2);font-style:italic;margin-bottom:8px;}
  .fact-source{font-size:11px;color:var(--ink-3);}

  /* Results */
  .sev-label{font-size:11px;font-weight:700;letter-spacing:4px;color:var(--ink-3);text-transform:uppercase;margin-bottom:12px;}
  .sev-level{font-size:clamp(40px,10vw,64px);font-weight:800;letter-spacing:3px;margin-bottom:24px;line-height:1;text-transform:uppercase;}
  .score-bar{height:6px;background:var(--line);border-radius:3px;overflow:hidden;margin-bottom:8px;}
  .score-fill{height:100%;background:linear-gradient(90deg,#6b9e6b,#c4a035,#a34620,#b82030);transition:width 1.5s ease;border-radius:3px;}
  .score-labs{display:flex;justify-content:space-between;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;}
  .sev-msg{font-size:17px;line-height:1.8;color:var(--ink-2);}

  .r-section{margin-bottom:56px;}
  .r-title{font-size:13px;font-weight:700;letter-spacing:4px;color:var(--copper);text-transform:uppercase;margin-bottom:24px;}
  .r-facts{display:flex;flex-direction:column;gap:16px;}
  .r-fact{display:flex;gap:20px;padding:22px;background:var(--card);border:1px solid var(--line);border-radius:14px;}
  .r-fact .n{font-size:24px;font-weight:800;color:var(--copper);opacity:0.5;flex-shrink:0;}
  .r-fact p{font-size:15.5px;line-height:1.7;color:var(--ink-2);margin:0;}

  .mech{padding:32px;background:var(--copper-soft);border-left:3px solid var(--copper);border-radius:0 14px 14px 0;}
  .mech h3{font-size:14px;font-weight:700;letter-spacing:4px;color:var(--copper);text-transform:uppercase;margin-bottom:18px;}
  .mech p{font-size:16px;line-height:1.8;color:var(--ink-2);margin-bottom:14px;}
  .mech p.strong{color:var(--ink);font-weight:700;}

  .esc p.intro-p{font-size:16px;line-height:1.8;color:var(--ink-2);margin-bottom:24px;}
  .esc-item{display:flex;gap:14px;margin-bottom:16px;padding-left:8px;}
  .esc-item .d{color:var(--copper);font-weight:800;flex-shrink:0;}
  .esc-item p{font-size:15px;line-height:1.7;color:var(--ink-2);margin:0;}
  .esc-warn{margin-top:24px;padding-left:16px;border-left:2px solid var(--line-2);font-size:16px;line-height:1.8;color:var(--ink-2);font-style:italic;}

  .timeline{padding-left:16px;}
  .tl-item{position:relative;padding-left:32px;padding-bottom:32px;border-left:1px solid var(--line);margin-left:6px;}
  .tl-dot{position:absolute;left:-7px;top:4px;width:14px;height:14px;border-radius:50%;background:var(--bg);border:2px solid var(--copper);display:flex;align-items:center;justify-content:center;}
  .tl-dot::after{content:"";width:4px;height:4px;border-radius:50%;background:var(--copper);}
  .tl-time{font-size:11px;font-weight:700;letter-spacing:3px;color:var(--copper);margin-bottom:6px;text-transform:uppercase;}
  .tl-title{font-size:20px;font-weight:700;margin-bottom:8px;letter-spacing:-0.01em;}
  .tl-desc{font-size:15px;line-height:1.7;color:var(--ink-2);}

  .cta{text-align:center;padding:40px 0;border-top:1px solid var(--line);}
  .cta h3{font-size:clamp(18px,3vw,22px);font-weight:800;letter-spacing:3px;text-transform:uppercase;margin-bottom:20px;}
  .cta p.it{font-size:16px;line-height:1.8;color:var(--ink-2);font-style:italic;max-width:520px;margin:0 auto 20px;}
  .cta .author{font-size:14px;color:var(--ink-3);line-height:1.6;margin-bottom:36px;}
  .cta .primary-cta{display:inline-block;font-size:14px;font-weight:700;letter-spacing:3px;padding:16px 40px;background:transparent;color:var(--copper);border:1px solid var(--copper);text-decoration:none;transition:all .2s;text-transform:uppercase;margin-bottom:12px;font-family:inherit;cursor:pointer;}
  .cta .primary-cta:hover{background:var(--copper);color:var(--card);}
  .cta .sub{font-size:13px;color:var(--ink-3);line-height:1.6;margin-bottom:20px;}
  .cta .restart{font-size:14px;background:none;border:none;color:var(--ink-3);cursor:pointer;padding:8px;font-family:inherit;}

  .foot{text-align:center;padding:40px 0 0;border-top:1px solid var(--line);margin-top:24px;}
  .foot .line{width:40px;height:1px;background:var(--line-2);margin:0 auto 20px;}
  .foot .t{font-size:11px;font-weight:700;letter-spacing:4px;color:var(--ink-3);margin-bottom:12px;}
  .foot .s{font-size:11px;color:var(--ink-3);line-height:1.6;max-width:500px;margin:0 auto 14px;}
  .foot .d{font-size:12px;color:var(--ink-3);line-height:1.6;max-width:400px;margin:0 auto 10px;}
  .foot .p{font-size:11px;color:var(--ink-3);line-height:1.6;max-width:400px;margin:0 auto;font-style:italic;}
</style>
</head>
<body data-active="assessment">

<main class="page narrow">
  <div id="app"></div>
</main>

<script src="chrome.js"></script>
<script>
// ——— Copied verbatim from the real repo ———
const QUESTIONS = [
  {id:"exposure_age", question:"When were you first exposed to pornography?",
    options:[{label:"Under 10",value:"under10",score:4},{label:"10–12",value:"10-12",score:3},{label:"12–15",value:"12-15",score:2},{label:"16+",value:"16+",score:1}]},
  {id:"frequency", question:"How often have you consumed pornography in the past year?",
    options:[{label:"Once or more daily",value:"daily",score:4},{label:"Every other day",value:"every_other",score:3},{label:"Once a week",value:"weekly",score:2},{label:"1–2 times a month",value:"monthly",score:1}]},
  {id:"session_length", question:"How long does a typical session last?",
    options:[{label:"Less than 1 hour",value:"under1",score:1},{label:"1–2 hours",value:"1-2",score:2},{label:"3–5 hours",value:"3-5",score:3},{label:"6+ hours",value:"6+",score:4}]},
  {id:"substances", question:"Do you combine porn with any other substance?", subtitle:"Select all that apply", multi:true,
    options:[{label:"Cannabis / Weed",value:"weed",score:2},{label:"Alcohol",value:"alcohol",score:2},{label:"Amphetamines / Stimulants",value:"amphetamines",score:3},{label:"Other substances",value:"other",score:2},{label:"No, porn only",value:"none",score:0}]},
  {id:"fetish_escalation", question:"Have you developed fetishes you believe you wouldn't have without pornography?", subtitle:"Content that disturbs you afterwards. Things you'd never seek in real life.",
    options:[{label:"Yes, significantly",value:"yes_significant",score:4},{label:"Yes, somewhat",value:"yes_somewhat",score:3},{label:"I'm not sure",value:"unsure",score:2},{label:"No",value:"no",score:0}]},
];

const QUIZ_FACTS = [
  {text:"After just 6 weeks of one-hour weekly porn sessions, both men and women reported significantly less satisfaction with their partner's affection, appearance, and sexual performance.", source:"Zillmann & Bryant, Journal of Applied Social Psychology, 1988"},
  {text:"The Kinsey Report (1948) found erectile dysfunction in less than 1% of men under 19. Six studies since 2010 found rates of 14–33% in the same age group. That's a 1,000% increase.", source:"Your Brain on Porn, citing Kinsey (1948) + 6 post-2010 studies"},
  {text:"78.6% of males aged 16–21 reported a sexual problem during partnered activity. ED affected 45%, low desire 46%, difficulty orgasming 24%.", source:"O'Sullivan et al., Canadian sexologists' study, 2016"},
  {text:"Your brain responds to internet pornography the same way it responds to cocaine — decreased grey matter, reduced dopamine sensitivity, and compulsive seeking behavior.", source:"Voon et al., Cambridge University, PLOS ONE, 2014"},
  {text:"Dopamine isn't the 'pleasure chemical' — it's the 'seeking chemical.' It doesn't say 'that was good.' It says 'more, different, keep going.' Porn hijacks this system.", source:"Berridge & Robinson, Brain Research Reviews, 1993"},
  {text:"In Japan, 36% of men aged 16–19 reported no interest in sex in 2010 — more than double the 17.5% from just two years earlier.", source:"Japan Times, 2011"},
  {text:"When researchers showed the same erotic film repeatedly, arousal steadily declined. When they introduced novel content on the 19th viewing — arousal instantly spiked. Your brain craves novelty, not satisfaction.", source:"Koukounas & Over, Behavioural Brain Research, 2000"},
  {text:"The prefrontal cortex — your brain's 'brakes' for impulse control — doesn't fully mature until age 25. Porn exposure before that age wires the reward system while the brakes are still being installed.", source:"Casey et al., Developmental Psychobiology, 2008"},
  {text:"Even moderate porn use correlates with reduced grey matter in brain regions associated with motivation, decision-making, and cognitive function.", source:"Kühn & Gallinat, JAMA Psychiatry, 2014"},
  {text:"Almost 60% of porn addicts in a Cambridge University study experienced diminished libido or erectile function with real partners — but not with pornography.", source:"Voon et al., Cambridge University, 2014"},
  {text:"A meta-analysis of 50 studies with 50,000+ participants confirmed: pornography consumption is associated with lower sexual and relational satisfaction.", source:"Wright et al., Human Communication Research, 2017"},
];

const SEVERITY_FACTS = {
  low:[
    "Even moderate porn use has been shown to correlate with reduced grey matter in the brain and decreased sexual responsiveness. You don't need to be an 'addict' to be affected.",
    "Porn consumption at any level is associated with lower relationship satisfaction and distorted expectations of real partners.",
  ],
  moderate:[
    "At your level of use, your brain's dopamine baseline has likely shifted. Studies show this is when users first start noticing that real intimacy feels 'flat' compared to porn.",
    "You are in the range where escalation to more extreme content typically begins. Tolerance builds — and what shocked you a year ago may already seem routine.",
    "Research shows habitual users report less satisfaction with their partners' affection, appearance, and sexual performance — even when their partners haven't changed.",
  ],
  severe:[
    "At this level, Cambridge University researchers found almost 60% of subjects experienced erectile dysfunction or diminished libido — but only with real partners. Not with porn.",
    "Your brain's reward circuitry now mirrors patterns seen in cocaine and methamphetamine addiction: decreased grey matter, reduced dopamine receptors, compulsive seeking behavior.",
    "Users at your severity commonly report escalating to content they find personally disturbing — genres they never sought before porn rewired their tolerance thresholds.",
    "The age you first started using porn is a significant predictor of how far escalation goes. Research shows earlier onset correlates with greater progression to extreme and deviant content.",
  ],
  critical:[
    "Combining substances with pornography creates compounding neurological damage. Each substance amplifies the dopamine dysregulation, accelerating the addiction cascade.",
    "At crisis-level addiction, your dopamine system is so compromised that you may be unable to experience motivation, pleasure, or connection outside of the addiction cycle itself.",
    "This level of use typically presents with: complete loss of attraction to real partners, severe erectile dysfunction, social withdrawal, inability to concentrate, depression, and emotional numbness.",
    "Recovery from this level is absolutely possible. Brain plasticity works both ways. But it requires complete cessation, not reduction.",
  ],
};

const SEVERITY_LEVELS = [
  {threshold:0, level:"Low Risk", color:"#6b9e6b", key:"low",
    message:"Your usage appears relatively low-risk, but any level of habitual porn use rewires your brain's reward circuitry. The earlier you address it, the easier recovery is."},
  {threshold:6, level:"Moderate", color:"#c4a035", key:"moderate",
    message:"You're showing clear signs of habitual use. Your brain's dopamine baseline has likely shifted — you may already notice that real intimacy, motivation, or focus feels dulled. This doesn't stay at this level. It escalates."},
  {threshold:11, level:"Severe", color:"#a34620", key:"severe",
    message:"You are deep in an addiction cycle. The combination of frequency, session length, and escalating content means your dopamine system is significantly compromised. You may be experiencing erectile dysfunction, social withdrawal, brain fog, or emotional numbness. This is not a habit — it's a dependency."},
  {threshold:16, level:"Critical", color:"#b82030", key:"critical",
    message:"You are in crisis-level addiction. The combination of substances with pornography creates compounding neurological damage. Your addiction cascade means each behavior reinforces the others. Without intervention, this path leads to complete isolation, destroyed relationships, job loss, and potentially worse. You already know this."},
];

const BENEFITS = [
  {timeframe:"Days 1–7", title:"The Storm", description:"Withdrawal hits hard. Irritability, insomnia, cravings. Your brain is screaming for dopamine. This is where most people fail — and exactly where your fear-based motivation matters most."},
  {timeframe:"Days 7–30", title:"The Fog Lifts", description:"Improved focus and mental clarity. You start remembering what it feels like to be present. Morning motivation returns. Eye contact becomes easier."},
  {timeframe:"Days 30–90", title:"The Rewiring", description:"Dopamine receptors begin recovering. Real attraction to real people returns. Confidence builds naturally — not forced. Emotional depth you forgot you had."},
  {timeframe:"90+ Days", title:"The Person You Were Supposed To Be", description:"Full neurological recovery in progress. Relationships deepen. Ambition returns. You stop surviving and start building. The version of you that addiction buried starts to surface."},
];

// ——— State ———
function getSeverity(score){let r=SEVERITY_LEVELS[0];for(const lv of SEVERITY_LEVELS)if(score>=lv.threshold)r=lv;return r;}
function shuffle(a){const s=[...a];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s;}

let phase = "intro", currentQ=0, answers={}, multiSel=[], score=0;
const quizFacts = shuffle(QUIZ_FACTS).slice(0, QUESTIONS.length);
let resultFacts = [];

const app = document.getElementById('app');

function escapeHTML(s){return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function renderIntro(){
  app.innerHTML = `
    <div class="intro">
      <div class="mark"><img src="/phoenix.png" alt="" style="width:64px;height:64px;filter:brightness(0) saturate(100%) invert(29%) sepia(50%) saturate(2180%) hue-rotate(357deg) brightness(90%) contrast(95%);"></div>
      <h1>Mission Phoenix</h1>
      <div class="sep"></div>
      <p class="sub">A pornography addiction assessment built by someone who lived it.</p>
      <p class="desc">5 questions. No account needed. No data stored.<br>Just honesty with yourself.</p>
      <button class="begin" onclick="startQuiz()">Begin Assessment</button>
      <p class="disclaim">This is not a clinical diagnostic tool. It is a wake-up call.</p>
    </div>`;
}
window.startQuiz = () => { phase="quiz"; currentQ=0; answers={}; multiSel=[]; renderQuiz(); };

function renderQuiz(){
  const q = QUESTIONS[currentQ];
  const progress = (currentQ/QUESTIONS.length)*100;
  const fact = quizFacts[currentQ];
  app.innerHTML = `
    <div class="quiz">
      <div class="progress"><div style="width:${progress}%"></div></div>
      <div class="q-count">${currentQ+1} / ${QUESTIONS.length}</div>
      <h2 class="q-text">${escapeHTML(q.question)}</h2>
      ${q.subtitle ? `<p class="q-subtitle">${escapeHTML(q.subtitle)}</p>` : ''}
      <div class="opts">
        ${q.options.map(opt => {
          const sel = q.multi ? multiSel.includes(opt.value) : answers[q.id]?.value===opt.value;
          return `<button class="opt${sel?' selected':''}" data-v="${opt.value}">${escapeHTML(opt.label)}</button>`;
        }).join('')}
      </div>
      ${q.multi ? `<button class="continue" id="cont" ${multiSel.length===0?'disabled':''}>Continue →</button>` : ''}
      <div class="fact">
        <div class="fact-lab">Did You Know</div>
        <p class="fact-text">${escapeHTML(fact.text)}</p>
        ${fact.source ? `<p class="fact-source">${escapeHTML(fact.source)}</p>` : ''}
      </div>
    </div>`;

  app.querySelectorAll('.opt').forEach(btn => btn.addEventListener('click', () => {
    const v = btn.dataset.v;
    const opt = q.options.find(o => o.value===v);
    if (q.multi){
      if (v==="none") multiSel=["none"];
      else {
        multiSel = multiSel.filter(x => x!=="none");
        multiSel = multiSel.includes(v) ? multiSel.filter(x=>x!==v) : [...multiSel, v];
      }
      renderQuiz();
    } else {
      answers[q.id]=opt;
      advance();
    }
  }));
  const c = document.getElementById('cont');
  if (c) c.addEventListener('click', () => {
    if (multiSel.length===0) return;
    const opts = q.options.filter(o => multiSel.includes(o.value));
    const sc = opts.reduce((s,o) => s + o.score, 0);
    answers[q.id] = {value: multiSel, score: sc};
    multiSel = [];
    advance();
  });
}

function advance(){
  if (currentQ < QUESTIONS.length - 1){ currentQ++; renderQuiz(); }
  else finish();
}

function finish(){
  score = Object.values(answers).reduce((s,a) => s + (a.score||0), 0);
  const sev = getSeverity(score);
  resultFacts = shuffle(SEVERITY_FACTS[sev.key] || SEVERITY_FACTS.low).slice(0,3);
  phase = "results";
  renderResults();
}

function renderResults(){
  const sev = getSeverity(score);
  const scorePct = Math.min((score/19)*100, 100);
  app.innerHTML = `
    <div class="r-section" style="padding-top:20px;">
      <div class="sev-label">Your assessment</div>
      <div class="sev-level" style="color:${sev.color};">${sev.level}</div>
      <div class="score-bar"><div class="score-fill" style="width:${scorePct}%"></div></div>
      <div class="score-labs">
        <span style="color:#6b9e6b;">Low</span>
        <span style="color:#c4a035;">Moderate</span>
        <span style="color:#a34620;">Severe</span>
        <span style="color:#b82030;">Critical</span>
      </div>
      <p class="sev-msg">${escapeHTML(sev.message)}</p>
    </div>

    <div class="r-section">
      <h3 class="r-title">What the research says about your level</h3>
      <div class="r-facts">
        ${resultFacts.map((f,i) => `<div class="r-fact"><div class="n">${String(i+1).padStart(2,'0')}</div><p>${escapeHTML(f)}</p></div>`).join('')}
      </div>
    </div>

    <div class="r-section">
      <div class="mech">
        <h3>How your brain gets hijacked</h3>
        <p>Dopamine isn't your pleasure chemical — it's your seeking chemical. It doesn't say "that was satisfying." It says "more, different, keep going." Pornography exploits this by offering infinite novelty at zero effort.</p>
        <p>When you chronically overstimulate this system, your brain protects itself by reducing dopamine sensitivity. Now you need more extreme content to feel the same thing. This is the same tolerance mechanism behind cocaine and methamphetamine addiction — confirmed by brain imaging studies at Cambridge University and the Max Planck Institute.</p>
        <p>Meanwhile, your prefrontal cortex — the part that says "this is wrong, stop" — gets overridden by the hijacked reward system. The moral reasoning is still there. That's why you feel disgusted afterward. But in the moment, the dopamine drive literally suppresses your ability to apply those values.</p>
        <p class="strong">This is not a character flaw. It is a neurological process. And it is reversible.</p>
      </div>
    </div>

    <div class="r-section esc">
      <h3 class="r-title">The escalation pattern</h3>
      <p class="intro-p">Research confirms what thousands of recovering users already know: porn use escalates. Not because you're broken — because your brain adapts. It demands more extreme stimuli to produce the same neurochemical response.</p>
      <div class="esc-item"><span class="d">—</span><p>Earlier onset of pornography use is the strongest predictor of escalation to deviant content. The younger you started, the deeper the wiring.</p></div>
      <div class="esc-item"><span class="d">—</span><p>Users consistently report arriving at content that previously disgusted them — genres they never sought, fantasies that conflict with their values and identity.</p></div>
      <div class="esc-item"><span class="d">—</span><p>A meta-analysis of 50 studies with over 50,000 participants confirmed that pornography consumption is associated with lower sexual and relational satisfaction — across every study type: cross-sectional, longitudinal, and experimental.</p></div>
      <p class="esc-warn">If you have found yourself watching content that would have disgusted you a year ago, you are not a deviant. You are experiencing a predictable neurological process — one that over 60 peer-reviewed studies have documented. And it will continue escalating until you stop feeding it.</p>
    </div>

    <div class="r-section">
      <h3 class="r-title">What happens when you stop</h3>
      <div class="timeline">
        ${BENEFITS.map(b => `
          <div class="tl-item">
            <div class="tl-dot"></div>
            <div class="tl-time">${escapeHTML(b.timeframe)}</div>
            <div class="tl-title">${escapeHTML(b.title)}</div>
            <div class="tl-desc">${escapeHTML(b.description)}</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="cta">
      <h3>This is your moment of clarity</h3>
      <p class="it">You're reading this because some part of you already knows. Hope alone won't save you — I tried that for 20 years. What works is finding the one consequence you fear more than the craving. That fear becomes your weapon.</p>
      <p class="author">— Michael, 41. Cold turkey from daily amphetamines, benzos, weed, and porn.<br>
      <span style="color:var(--ink-3);font-size:13px;">July 15, 2025. Couldn't run 100 meters. Ran 5K in 23:38 by December.</span></p>
      <a href="https://discord.com/invite/tXnBUSbq92" target="_blank" rel="noopener" class="primary-cta">Join the community — free</a>
      <p class="sub">Private Discord server. Men recovering together.<br>No judgment. No cost. Just accountability.</p>
      <button class="restart" onclick="restart()">← Take assessment again</button>
    </div>

    <div class="foot">
